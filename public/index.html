<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Axel's Website Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg1: #070A12;
      --bg2: #0B1224;
      --stroke: #ffffff1a;
      --text: #EAF0FF;
      --muted: #8899CC;
      --good: #37ffb0;
      --bad: #ff4d6d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      padding: env(safe-area-inset-top) 8px 4px;
      background: #050815f0;
      border-bottom: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: max(env(safe-area-inset-top), 4px);
    }
    h1 { font-size: 11px; font-weight: 800; letter-spacing: .2px; }
    .meta { font-size: 8px; color: var(--muted); margin-top: 1px; }
    .counts { font-size: 10px; color: var(--muted); font-weight: 600; white-space: nowrap; }
    button {
      border: 1px solid var(--stroke);
      background: #0b1224cc;
      color: var(--text);
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }
    button:active { transform: scale(.97); }

    /* ── Main ────────────────────────────────────────────── */
    main {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Grid ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr;
      gap: 5px;
      padding: 5px;
      /* fill main's height so rows expand to fill screen */
      min-height: 100%;
      height: 100%;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active .card-bg { opacity: .85; }

    .card-name {
      font-size: 9px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      line-height: 1;
      flex-shrink: 0;
    }

    /*
      Status indicator: colored wrapper that BLEEDS past the image
      on the sides and bottom, so from a distance the image sits
      on a green or red background.
    */
    .card-bg {
      flex: 1;
      min-height: 55px;
      border-radius: 7px;
      /* side padding bleeds color left/right of image; bottom padding bleeds below */
      padding: 2px 4px 6px;
      transition: background .3s;
    }
    .card-bg.up   { background: var(--good); }
    .card-bg.down { background: var(--bad); }

    .card-img {
      width: 100%;
      height: 100%;
      border-radius: 5px;
      overflow: hidden;
      background: #050815;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-no-preview {
      font-size: 9px;
      color: #444;
    }

    .card-ms {
      font-size: 7px;
      color: var(--muted);
      text-align: center;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Axel's Dashboard</h1>
      <div class="meta" id="meta">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="counts" id="counts">—</span>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <script>
  const gridEl    = document.getElementById("grid");
  const metaEl    = document.getElementById("meta");
  const countsEl  = document.getElementById("counts");
  const refreshBtn = document.getElementById("refreshBtn");

  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function fmtMs(ms) {
    if (ms == null) return "—";
    return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return "—";
    return d.toLocaleString("sv-SE", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
  }

  async function load() {
    const res  = await fetch(`/api/status?t=${Date.now()}`, { cache: "no-store" });
    const data = await res.json();

    metaEl.textContent = fmtDate(data.updatedAt);

    const sites = data.sites ?? [];
    const up    = sites.filter(s => s.up).length;
    countsEl.textContent = `UP ${up} / DOWN ${sites.length - up}`;

    // DOWN first, then by latency
    sites.sort((a, b) => {
      if (a.up !== b.up) return a.up ? 1 : -1;
      return (a.ms ?? 999999) - (b.ms ?? 999999);
    });

    gridEl.innerHTML = "";

    for (const s of sites) {
      const thumbUrl = s.preview ? `${s.preview}?t=${Date.now()}` : "";

      const card = document.createElement("div");
      card.className = "card";
      card.title = s.url ?? "";
      card.innerHTML = `
        <div class="card-name">${escapeHtml(s.name ?? "Site")}</div>
        <div class="card-bg ${s.up ? "up" : "down"}">
          <div class="card-img">
            ${thumbUrl
              ? `<img src="${escapeHtml(thumbUrl)}" alt="${escapeHtml(s.name ?? "")}">`
              : `<span class="card-no-preview">No preview</span>`
            }
          </div>
        </div>
        <div class="card-ms">${escapeHtml(fmtMs(s.ms))}</div>
      `;

      card.addEventListener("click", () => {
        window.open(s.url, "_blank", "noopener,noreferrer");
      });

      gridEl.appendChild(card);
    }
  }

  async function refreshNow() {
    refreshBtn.disabled = true;
    refreshBtn.textContent = "…";
    try {
      await fetch("/api/refresh", { method: "POST" });
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh";
      await load();
    }
  }

  refreshBtn.addEventListener("click", refreshNow);
  load();
  setInterval(load, 60000);
  </script>
</body>
</html>
